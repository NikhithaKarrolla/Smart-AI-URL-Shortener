version: "3.9"

services:
  redis:
    image: redis:7
    container_name: redis
    restart: always

    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: backend
    restart: always

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - redis

    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always

    ports:
      - "3000:3000"

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - /app/node_modules